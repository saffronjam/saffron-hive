name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: oven-sh/setup-bun@v2

      - run: bun install
        working-directory: web

      - name: Check Go formatting
        run: |
          gofmt -l . | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out

      - name: Check frontend formatting
        run: bunx oxfmt --check src/
        working-directory: web

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: oven-sh/setup-bun@v2

      - run: bun install
        working-directory: web

      - name: Go vet
        run: go vet ./...

      - name: Oxlint
        run: bunx oxlint .
        working-directory: web

  sqlc-check:
    name: sqlc drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: "1.31.0"

      - name: Verify sqlc output is up to date
        run: make sqlc-check

  codegen-check:
    name: graphql-codegen drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install
        working-directory: web

      - name: Verify graphql-codegen output is up to date
        run: make codegen-check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - uses: oven-sh/setup-bun@v2

      - run: bun install
        working-directory: web

      - name: Go tests
        run: go test ./... -race -count=1

      - name: Frontend tests
        run: bun run test
        working-directory: web

  e2e-go:
    name: E2E (Go)
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: [format, lint, sqlc-check, codegen-check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      # Go e2e runs the app in-process; no Docker image needed.
      - name: Go E2E tests
        run: go test -tags e2e ./e2e/... -v -count=1 -timeout=120s

  e2e-ts:
    name: E2E (Frontend)
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: [format, lint, sqlc-check, codegen-check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install
        working-directory: web

      # Frontend e2e uses testcontainers to spin up the real saffron-hive
      # image + a mosquitto sidecar.
      - name: Build test image
        run: docker build -t saffron-hive-test .

      - name: Frontend E2E tests
        run: bun run test:e2e
        working-directory: web

  build-and-push:
    name: Build & Push
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: [e2e-go, e2e-ts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=$(git describe --tags --exact-match)" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/saffronjam/saffron-hive:${{ steps.tag.outputs.tag }}
          build-args: |
            HIVE_VERSION=${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
