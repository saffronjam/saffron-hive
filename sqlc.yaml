version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/store/migrations"
    queries: "internal/store/queries"
    gen:
      go:
        package: "sqlite"
        out: "internal/store/sqlite"
        emit_interface: true
        emit_pointers_for_null_types: true
        overrides:
          - column: "devices.id"
            go_type: "github.com/saffronjam/saffron-hive/internal/device.DeviceID"
          - column: "devices.source"
            go_type: "github.com/saffronjam/saffron-hive/internal/device.Source"
          - column: "devices.type"
            go_type: "github.com/saffronjam/saffron-hive/internal/device.DeviceType"
          - column: "zigbee_devices.device_id"
            go_type: "github.com/saffronjam/saffron-hive/internal/device.DeviceID"
          - column: "device_state_samples.device_id"
            go_type: "github.com/saffronjam/saffron-hive/internal/device.DeviceID"
          - column: "group_members.member_type"
            go_type: "github.com/saffronjam/saffron-hive/internal/device.GroupMemberType"
          - column: "scene_actions.target_type"
            go_type: "github.com/saffronjam/saffron-hive/internal/device.TargetType"
          - column: "scene_device_payloads.device_id"
            go_type: "github.com/saffronjam/saffron-hive/internal/device.DeviceID"
          - column: "scene_expected_states.device_id"
            go_type: "github.com/saffronjam/saffron-hive/internal/device.DeviceID"
