apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saffron-hive
  namespace: home
  labels:
    app.kubernetes.io/name: saffron-hive
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: saffron-hive
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - hive.saffronbun.com
      secretName: wildcard-saffronbun-tls
  rules:
    - host: hive.saffronbun.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: saffron-hive
                port:
                  number: 8080
