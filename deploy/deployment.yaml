apiVersion: apps/v1
kind: Deployment
metadata:
  name: saffron-hive
  namespace: home
  labels:
    app.kubernetes.io/name: saffron-hive
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: saffron-hive
  template:
    metadata:
      labels:
        app.kubernetes.io/name: saffron-hive
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/saffronjam/saffron-hive:latest
          command: ["saffron-hive", "migrate", "up"]
          envFrom:
            - configMapRef:
                name: saffron-hive
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: saffron-hive
          image: ghcr.io/saffronjam/saffron-hive:latest
          command: ["saffron-hive", "serve"]
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: saffron-hive
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: saffron-hive-data
