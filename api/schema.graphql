scalar DateTime

type Capability {
  name: String!
  type: String!
  values: [String!]
  valueMin: Float
  valueMax: Float
  unit: String
  access: Int!
}

type Device {
  id: ID!
  name: String!
  source: String!
  type: String!
  capabilities: [Capability!]!
  available: Boolean!
  lastSeen: DateTime
  state: DeviceState
}

"""
Current state of a device across every capability it reports. Every field is
nullable — null means the device has not reported (or does not report) that
value. Clients typically branch on Device.type to decide which fields to
display, but any field may be present on any device.
"""
type DeviceState {
  on: Boolean
  brightness: Int
  colorTemp: Int
  color: Color
  transition: Float
  temperature: Float
  humidity: Float
  pressure: Float
  illuminance: Float
  battery: Int
  power: Float
  voltage: Float
  current: Float
  energy: Float
}

type Color {
  r: Int!
  g: Int!
  b: Int!
  x: Float!
  y: Float!
}

type Scene {
  id: ID!
  name: String!
  icon: String
  actions: [SceneAction!]!
  """
  Per-device payload overrides the user has saved explicitly. Devices that
  inherit their room/group default do NOT appear here. Use this for the
  scene editor's override rows; use effectivePayloads for display tint.
  """
  devicePayloads: [SceneDevicePayload!]!
  """
  One payload per unique device reached by the scene's action targets
  (rooms, groups, or direct devices), in the same order apply-scene would
  command them. Devices without an explicit override appear with a
  capability-filtered default (warm-white on), so consumers can tint cards,
  preview apply behaviour, etc. without re-implementing the resolution.
  """
  effectivePayloads: [SceneDevicePayload!]!
  createdBy: User
  """
  Non-null while this scene is currently the state of its devices: every
  device the scene reached at apply time is still in the scene-relevant
  state the scene asked for. Any change to a scene-relevant field (on,
  brightness, colorTemp, color) on any of those devices clears this back
  to null. Use the presence of a value as "is this scene active right now".
  """
  activatedAt: DateTime
}

union SceneTarget = Device | Group | Room

type SceneAction {
  targetType: String!
  targetId: ID!
  target: SceneTarget!
}

type SceneDevicePayload {
  deviceId: ID!
  payload: String!
}

type AutomationGraph {
  id: ID!
  name: String!
  icon: String
  enabled: Boolean!
  lastFiredAt: DateTime
  nodes: [AutomationNode!]!
  edges: [AutomationEdge!]!
  createdBy: User
}

enum EffectKind {
  TIMELINE
  NATIVE
}

enum EffectStepKind {
  WAIT
  SET_ON_OFF
  SET_BRIGHTNESS
  SET_COLOR_RGB
  SET_COLOR_TEMP
}

type Effect {
  id: ID!
  name: String!
  icon: String
  kind: EffectKind!
  nativeName: String
  loop: Boolean!
  steps: [EffectStep!]!
  """
  Capabilities every target device must support for this effect to apply
  cleanly. Derived from the effect's step kinds for timeline effects;
  empty for native effects (the per-device native option list owns that
  filtering).
  """
  requiredCapabilities: [String!]!
  createdBy: User
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""
A single step inside a timeline effect. config is a JSON document whose
shape is determined by kind — the disk shape directly, not wrapped, e.g.
{"r":244,"g":42,"b":23,"transition_ms":200} for SET_COLOR_RGB.
"""
type EffectStep {
  id: ID!
  index: Int!
  kind: EffectStepKind!
  config: String!
}

input EffectStepInput {
  kind: EffectStepKind!
  config: String!
}

input CreateEffectInput {
  name: String!
  icon: String
  kind: EffectKind!
  nativeName: String
  loop: Boolean!
  steps: [EffectStepInput!]!
}

input UpdateEffectInput {
  id: ID!
  name: String
  icon: String
  loop: Boolean
  nativeName: String
  steps: [EffectStepInput!]
}

"""
One row marking that an effect is currently running on a target. volatile
mirrors the persistence flag — non-loop timeline runs and native runs are
volatile (wiped at process startup); loop timeline runs survive a restart.
"""
type ActiveEffect {
  id: ID!
  effect: Effect!
  targetType: String!
  targetId: ID!
  startedAt: DateTime!
  volatile: Boolean!
}

"""
A native effect option as offered by the editor. supportedDeviceCount is
the number of currently-known devices whose effect capability advertises
this value.
"""
type NativeEffectOption {
  name: String!
  displayName: String!
  supportedDeviceCount: Int!
}

"""
Step boundary marker emitted by the runner. active=true on enter,
active=false on exit. runId identifies the in-flight run instance.
"""
type EffectStepEvent {
  runId: ID!
  effectId: ID!
  stepIndex: Int!
  active: Boolean!
}

type AutomationNode {
  id: ID!
  type: String!
  config: String!
  positionX: Float!
  positionY: Float!
}

type AutomationEdge {
  fromNodeId: ID!
  toNodeId: ID!
}

type Group {
  id: ID!
  name: String!
  icon: String
  members: [GroupMember!]!
  resolvedDevices: [Device!]!
  createdBy: User
}

type GroupMember {
  id: ID!
  memberType: String!
  memberId: ID!
  device: Device
  group: Group
  room: Room
}

type Room {
  id: ID!
  name: String!
  icon: String
  members: [RoomMember!]!
  resolvedDevices: [Device!]!
  createdBy: User
}

type RoomMember {
  id: ID!
  memberType: String!
  memberId: ID!
  device: Device
  group: Group
}

type StateSeriesPoint {
  at: DateTime!
  value: Float!
}

type StateSeries {
  deviceId: ID!
  field: String!
  points: [StateSeriesPoint!]!
}

input StateHistoryFilter {
  deviceIds: [ID!]!
  fields: [String!]
  from: DateTime
  to: DateTime
  bucketSeconds: Int
}

type DeviceStateEvent {
  deviceId: ID!
  state: DeviceState!
}

type DeviceActionEvent {
  deviceId: ID!
  action: String!
  firedAt: DateTime!
}

type DeviceAvailabilityEvent {
  deviceId: ID!
  available: Boolean!
}

type AutomationNodeActivationEvent {
  automationId: ID!
  nodeId: ID!
  active: Boolean!
}

"""
Emitted whenever a scene's activation state flips. activatedAt is non-null
when the scene just became active, null when it was deactivated by a
device-state change.
"""
type SceneActiveEvent {
  sceneId: ID!
  activatedAt: DateTime
}

enum Theme {
  LIGHT
  DARK
}

type User {
  id: ID!
  username: String!
  name: String!
  """
  Avatar filename on the server, relative to the avatars endpoint. Null when
  no avatar has been uploaded; clients fall back to rendered initials. Resolve
  to a URL by prefixing with `/avatars/`.
  """
  avatarPath: String
  """
  UI theme preference stored per user. Present on full user loads (`me`,
  `users`). Null on attribution references (e.g. `scene.createdBy`), which
  only populate `id`, `username`, and `name`.
  """
  theme: Theme
  """
  Timestamp the user was created; used on the profile page as "member since".
  Present on full user loads, null on attribution references.
  """
  createdAt: DateTime
}

type AuthPayload {
  token: String!
  user: User!
}

type SetupStatus {
  hasInitialUser: Boolean!
  mqttConfigured: Boolean!
}

input LoginInput {
  username: String!
  password: String!
}

input CreateInitialUserInput {
  username: String!
  name: String!
  password: String!
}

input CreateUserInput {
  username: String!
  name: String!
  password: String!
}

input UpdateCurrentUserInput {
  name: String
  theme: Theme
}

input ChangePasswordInput {
  oldPassword: String!
  newPassword: String!
}

type MqttConfig {
  broker: String!
  username: String!
  password: String!
  useWss: Boolean!
}

type ConnectionTestResult {
  success: Boolean!
  message: String!
}

type Setting {
  key: String!
  value: String!
}

type LogEntry {
  timestamp: DateTime!
  level: String!
  message: String!
  attrs: String!
}

type ActivitySource {
  kind: String!
  id: ID
  name: String
  type: String
  roomId: ID
  roomName: String
}

type ActivityEvent {
  id: ID!
  type: String!
  timestamp: DateTime!
  message: String!
  payload: String!
  source: ActivitySource!
}

input ActivityFilter {
  types: [String!]
  deviceId: ID
  roomId: ID
  since: DateTime
  advanced: Boolean
  limit: Int
  before: ID
}

enum AlarmSeverity {
  HIGH
  MEDIUM
  LOW
}

enum AlarmKind {
  AUTO
  ONE_SHOT
}

"""
An alarm is an actionable severity-tagged signal. Rows are persisted 1:1 per
raise; this type is the grouped projection — multiple raises sharing the same
id collapse into one Alarm whose message/severity/kind come from the latest
raise and whose count reflects the group size.
"""
type Alarm {
  id: ID!
  latestRowId: ID!
  severity: AlarmSeverity!
  kind: AlarmKind!
  message: String!
  source: String!
  count: Int!
  firstRaisedAt: DateTime!
  lastRaisedAt: DateTime!
}

enum AlarmEventKind {
  RAISED
  CLEARED
}

type AlarmEvent {
  kind: AlarmEventKind!
  alarm: Alarm
  clearedAlarmId: ID
}

input AlarmFilter {
  severities: [AlarmSeverity!]
  kinds: [AlarmKind!]
  sources: [String!]
  since: DateTime
}

input RaiseAlarmInput {
  alarmId: ID!
  severity: AlarmSeverity!
  kind: AlarmKind!
  message: String!
  source: String
}

input MqttConfigInput {
  broker: String!
  username: String!
  password: String!
  useWss: Boolean!
}

input DeviceStateInput {
  on: Boolean
  brightness: Int
  colorTemp: Int
  color: ColorInput
  transition: Float
}

input ColorInput {
  r: Int!
  g: Int!
  b: Int!
  x: Float!
  y: Float!
}

input UpdateDeviceInput {
  name: String
}

input CreateSceneInput {
  name: String!
  actions: [SceneActionInput!]!
  devicePayloads: [SceneDevicePayloadInput!]
}

input SceneActionInput {
  targetType: String!
  targetId: ID!
}

"""
SceneDevicePayloadInput is one entry in a scene's per-device payload list.
The payload field is a JSON string carrying a tagged-union body. Three shapes
are supported:

  static:        {"kind":"static","on":true,"brightness":200,"color_temp":370}
  effect:        {"kind":"effect","effect_id":"<id>"}
  native_effect: {"kind":"native_effect","native_name":"<name>"}

The static shape's optional desired-state fields (on, brightness, color_temp,
color, transition) are filtered against the device's writable capabilities at
apply time. The effect shape starts the named stored timeline/native effect
run on this device when the scene is applied. The native_effect shape starts
an auto-discovered native effect (one whose name appears in
nativeEffectOptions) on this device. Deactivating the scene stops any runs
started for either effect shape.
"""
input SceneDevicePayloadInput {
  deviceId: ID!
  payload: String!
}

input UpdateSceneInput {
  name: String
  icon: String
  actions: [SceneActionInput!]
  devicePayloads: [SceneDevicePayloadInput!]
}

input CreateAutomationInput {
  name: String!
  enabled: Boolean!
  nodes: [AutomationNodeInput!]!
  edges: [AutomationEdgeInput!]!
}

input AutomationNodeInput {
  id: ID!
  type: String!
  config: String!
  positionX: Float! = 0
  positionY: Float! = 0
}

input AutomationEdgeInput {
  fromNodeId: ID!
  toNodeId: ID!
}

input CreateGroupInput {
  name: String!
}

input UpdateGroupInput {
  name: String
  icon: String
}

input AddGroupMemberInput {
  groupId: ID!
  memberType: String!
  memberId: ID!
}

input CreateRoomInput {
  name: String!
}

input UpdateRoomInput {
  name: String
  icon: String
}

input AddRoomMemberInput {
  roomId: ID!
  memberType: String!
  memberId: ID!
}

input RoomMemberInput {
  memberType: String!
  memberId: ID!
}

input UpdateAutomationInput {
  name: String
  icon: String
  enabled: Boolean
  nodes: [AutomationNodeInput!]
  edges: [AutomationEdgeInput!]
}

type Query {
  devices: [Device!]!
  device(id: ID!): Device
  scenes: [Scene!]!
  scene(id: ID!): Scene
  automations: [AutomationGraph!]!
  automation(id: ID!): AutomationGraph
  groups: [Group!]!
  group(id: ID!): Group
  rooms: [Room!]!
  room(id: ID!): Room
  stateHistory(filter: StateHistoryFilter!): [StateSeries!]!
  stateHistoryFields: [String!]!
  mqttConfig: MqttConfig
  settings: [Setting!]!
  logs(search: String, limit: Int): [LogEntry!]!
  activity(filter: ActivityFilter): [ActivityEvent!]!
  alarms(filter: AlarmFilter): [Alarm!]!
  setupStatus: SetupStatus!
  me: User
  users: [User!]!
  effects: [Effect!]!
  effect(id: ID!): Effect
  activeEffects: [ActiveEffect!]!
  nativeEffectOptions: [NativeEffectOption!]!
}

type Mutation {
  updateDevice(id: ID!, input: UpdateDeviceInput!): Device!
  setDeviceState(deviceId: ID!, state: DeviceStateInput!): Device!
  """
  Simulate a device-fired action by publishing a synthetic
  EventDeviceActionFired on the in-process event bus. Automations listening
  for the action run as if the physical device emitted it; no command is
  sent to the device itself. Useful for testing automations from the UI.
  """
  simulateDeviceAction(deviceId: ID!, action: String!): Boolean!
  applyScene(sceneId: ID!): Scene!
  createScene(input: CreateSceneInput!): Scene!
  updateScene(id: ID!, input: UpdateSceneInput!): Scene!
  deleteScene(id: ID!): Boolean!
  createAutomation(input: CreateAutomationInput!): AutomationGraph!
  updateAutomation(id: ID!, input: UpdateAutomationInput!): AutomationGraph!
  deleteAutomation(id: ID!): Boolean!
  toggleAutomation(id: ID!, enabled: Boolean!): AutomationGraph!
  """
  Fires a manual trigger node immediately. The automation must be enabled and
  the node must be a trigger with mode=manual. Bypasses the automation's
  cooldown. Intended for debugging automations from the editor.
  """
  fireAutomationTrigger(automationId: ID!, nodeId: ID!): Boolean!
  createGroup(input: CreateGroupInput!): Group!
  updateGroup(id: ID!, input: UpdateGroupInput!): Group!
  deleteGroup(id: ID!): Boolean!
  addGroupMember(input: AddGroupMemberInput!): GroupMember!
  removeGroupMember(id: ID!): Boolean!
  createRoom(input: CreateRoomInput!): Room!
  updateRoom(id: ID!, input: UpdateRoomInput!): Room!
  deleteRoom(id: ID!): Boolean!
  addRoomMember(input: AddRoomMemberInput!): RoomMember!
  removeRoomMember(id: ID!): Boolean!
  updateMqttConfig(input: MqttConfigInput!): MqttConfig!
  testMqttConnection(input: MqttConfigInput!): ConnectionTestResult!
  updateSetting(key: String!, value: String!): Setting!
  login(input: LoginInput!): AuthPayload!
  createInitialUser(input: CreateInitialUserInput!): AuthPayload!
  createUser(input: CreateUserInput!): User!
  updateCurrentUser(input: UpdateCurrentUserInput!): User!
  changePassword(input: ChangePasswordInput!): Boolean!
  resetUserPassword(id: ID!, newPassword: String!): Boolean!
  deleteUser(id: ID!): Boolean!
  raiseAlarm(input: RaiseAlarmInput!): Alarm!
  deleteAlarm(alarmId: ID!): Boolean!

  batchDeleteScenes(ids: [ID!]!): Int!
  batchDeleteAutomations(ids: [ID!]!): Int!
  batchDeleteGroups(ids: [ID!]!): Int!
  batchDeleteRooms(ids: [ID!]!): Int!
  batchDeleteAlarms(alarmIds: [ID!]!): Int!
  """
  Deletes the specified users. The currently authenticated user is silently
  skipped if present in the list. Returns the number of users actually deleted.
  """
  batchDeleteUsers(ids: [ID!]!): Int!

  batchAddRoomMembers(roomId: ID!, members: [RoomMemberInput!]!): Room!
  batchAddGroupDevices(groupId: ID!, deviceIds: [ID!]!): Group!

  createEffect(input: CreateEffectInput!): Effect!
  updateEffect(input: UpdateEffectInput!): Effect!
  deleteEffect(id: ID!): Boolean!
  """
  Starts effectId on the given target. Preempts any effect already
  running on the target. Returns the resulting active-run row.
  """
  runEffect(effectId: ID!, targetType: String!, targetId: ID!): ActiveEffect!
  """
  Starts a native effect by name on the given target without requiring a
  stored Effect row. Preempts any effect already running on the target.
  Native ad-hoc runs are fire-and-forget: no active_effects row is
  persisted, so Query.activeEffects will not list them. The returned
  ActiveEffect synthesises a transient view of the run.
  """
  runNativeEffect(nativeName: String!, targetType: String!, targetId: ID!): ActiveEffect!
  """
  Stops any effect currently running on the target. Returns true when a
  run was active, false otherwise.
  """
  stopEffect(targetType: String!, targetId: ID!): Boolean!
}

type Subscription {
  deviceStateChanged(deviceId: ID): DeviceStateEvent!
  deviceActionFired(deviceId: ID): DeviceActionEvent!
  deviceAvailabilityChanged: DeviceAvailabilityEvent!
  deviceAdded: Device!
  deviceRemoved: ID!
  automationNodeActivated(automationId: ID): AutomationNodeActivationEvent!
  sceneActiveChanged: SceneActiveEvent!
  logStream: LogEntry!
  activityStream(advanced: Boolean): ActivityEvent!
  alarmEvent: AlarmEvent!
  """
  Step-boundary events from the effect runner. When runId is provided,
  only events for that run are delivered; otherwise every effect run's
  step boundaries are broadcast.
  """
  effectStepActivated(runId: ID): EffectStepEvent!
}
