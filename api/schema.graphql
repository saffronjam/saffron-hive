scalar DateTime

"""
Marks a field as requiring an authenticated caller. The directive resolver
rejects the request with code UNAUTHENTICATED when no user is attached to the
request context. Default-deny: every Query / Mutation / Subscription field
should carry @auth unless it is intentionally public (login, createInitialUser,
setupStatus, me).
"""
directive @auth on FIELD_DEFINITION

type Capability {
  name: String!
  type: String!
  values: [String!]
  valueMin: Float
  valueMax: Float
  unit: String
  access: Int!
}

type Device {
  id: ID!
  name: String!
  icon: String
  source: String!
  type: String!
  capabilities: [Capability!]!
  available: Boolean!
  lastSeen: DateTime
  state: DeviceState
}

"""
Current state of a device across every capability it reports. Every field is
nullable — null means the device has not reported (or does not report) that
value. Clients typically branch on Device.type to decide which fields to
display, but any field may be present on any device.
"""
type DeviceState {
  on: Boolean
  brightness: Int
  colorTemp: Int
  color: Color
  transition: Float
  temperature: Float
  humidity: Float
  pressure: Float
  illuminance: Float
  battery: Float
  power: Float
  voltage: Float
  current: Float
  energy: Float
}

type Color {
  r: Int!
  g: Int!
  b: Int!
  x: Float!
  y: Float!
}

type Scene {
  id: ID!
  name: String!
  icon: String
  """
  Rooms this scene is tagged to. Drives the per-room dashboard drawer's
  scene list — the drawer for a given room shows scenes whose `rooms`
  contain that room. A scene can carry zero rooms (not surfaced in any
  room drawer) or many.
  """
  rooms: [Room!]!
  actions: [SceneAction!]!
  """
  Per-device payload overrides the user has saved explicitly. Devices that
  inherit their room/group default do NOT appear here. Use this for the
  scene editor's override rows; use effectivePayloads for display tint.
  """
  devicePayloads: [SceneDevicePayload!]!
  """
  One payload per unique device reached by the scene's action targets
  (rooms, groups, or direct devices), in the same order apply-scene would
  command them. Devices without an explicit override appear with a
  capability-filtered default (warm-white on), so consumers can tint cards,
  preview apply behaviour, etc. without re-implementing the resolution.
  """
  effectivePayloads: [SceneDevicePayload!]!
  createdBy: User
  """
  Non-null while this scene is currently the state of its devices: every
  device the scene reached at apply time is still in the scene-relevant
  state the scene asked for. Any change to a scene-relevant field (on,
  brightness, colorTemp, color) on any of those devices clears this back
  to null. Use the presence of a value as "is this scene active right now".
  """
  activatedAt: DateTime
}

union SceneTarget = Device | Group | Room

type SceneAction {
  targetType: String!
  targetId: ID!
  target: SceneTarget!
}

type SceneDevicePayload {
  deviceId: ID!
  payload: String!
}

type AutomationGraph {
  id: ID!
  name: String!
  icon: String
  enabled: Boolean!
  lastFiredAt: DateTime
  nodes: [AutomationNode!]!
  edges: [AutomationEdge!]!
  createdBy: User
}

enum EffectKind {
  TIMELINE
  NATIVE
}

enum EffectClipKind {
  SET_ON_OFF
  SET_BRIGHTNESS
  """
  Sets the color of the target — either RGB or color temperature, distinguished
  by the config's "mode" field ("rgb" or "temp"). Required device capability is
  derived per-clip from the mode (color vs color_temp).
  """
  SET_COLOR
  NATIVE_EFFECT
}

type Effect {
  id: ID!
  name: String!
  icon: String
  kind: EffectKind!
  nativeName: String
  loop: Boolean!
  """
  For loop=true timeline effects, the loop length in milliseconds (the
  position of the End line on the editor timeline). Inter-loop delay equals
  durationMs minus the rightmost clip's end. For loop=false effects, this is
  informational and reflects the rightmost clip end captured at save time.
  Always 0 for native effects.
  """
  durationMs: Int!
  tracks: [EffectTrack!]!
  """
  Capabilities every target device must support for this effect to apply
  cleanly. Derived from the union of clip kinds across all tracks for
  timeline effects; empty for native effects (the per-device native option
  list owns that filtering). native_effect clips inside a timeline
  contribute no capability either; their support is gated by the device's
  effect cap value list.
  """
  requiredCapabilities: [String!]!
  createdBy: User
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""
A single track inside a timeline effect. Tracks fire in parallel; clips
within a track are mutually exclusive in time. name is a user-supplied
label shown in the editor; empty string is valid and rendered as a
placeholder ("Track {n}").
"""
type EffectTrack {
  id: ID!
  index: Int!
  name: String!
  clips: [EffectClip!]!
}

"""
A single clip on a track. config is a JSON document whose shape is
determined by kind — the inner config struct directly, e.g.
{"mode":"rgb","rgb":{"r":244,"g":42,"b":23}} for a SET_COLOR clip in rgb
mode, {"mode":"temp","temp":{"mireds":370}} for the same kind in temp mode.
transitionMinMs and transitionMaxMs bound a uniform random pick of the
actual transition sampled per clip-execution; equal bounds collapse to a
deterministic value.
"""
type EffectClip {
  id: ID!
  startMs: Int!
  transitionMinMs: Int!
  transitionMaxMs: Int!
  kind: EffectClipKind!
  config: String!
}

input EffectTrackInput {
  name: String!
  clips: [EffectClipInput!]!
}

input EffectClipInput {
  startMs: Int!
  transitionMinMs: Int!
  transitionMaxMs: Int!
  kind: EffectClipKind!
  config: String!
}

input CreateEffectInput {
  name: String!
  icon: String
  kind: EffectKind!
  nativeName: String
  loop: Boolean!
  durationMs: Int!
  tracks: [EffectTrackInput!]!
}

input UpdateEffectInput {
  id: ID!
  name: String
  icon: String
  loop: Boolean
  durationMs: Int
  nativeName: String
  tracks: [EffectTrackInput!]
}

"""
One row marking that an effect is currently running on a target. volatile
mirrors the persistence flag — non-loop timeline runs and native runs are
volatile (wiped at process startup); loop timeline runs survive a restart.
"""
type ActiveEffect {
  id: ID!
  effect: Effect!
  targetType: String!
  targetId: ID!
  startedAt: DateTime!
  volatile: Boolean!
}

"""
A native effect option as offered by the editor. supportedDeviceCount is
the number of currently-known devices whose effect capability advertises
this value.
"""
type NativeEffectOption {
  name: String!
  displayName: String!
  supportedDeviceCount: Int!
}

"""
Clip boundary marker emitted by the runner. active=true on enter,
active=false on exit. runId identifies the in-flight run instance.
stepIndex is the clip's ordinal in the iteration's flat sorted-by-startMs
event list.
"""
type EffectStepEvent {
  runId: ID!
  effectId: ID!
  stepIndex: Int!
  active: Boolean!
}

type AutomationNode {
  id: ID!
  type: String!
  config: String!
  positionX: Float!
  positionY: Float!
}

type AutomationEdge {
  fromNodeId: ID!
  toNodeId: ID!
}

type Group {
  id: ID!
  name: String!
  icon: String
  tags: [GroupTag!]!
  members: [GroupMember!]!
  resolvedDevices: [Device!]!
  createdBy: User
}

"""
GroupTag classifies a group by the role it represents on the dashboard.
A group can carry zero, one, or both tags. Tags drive the auto-generated
dashboard: a LIGHT-tagged group containing multiple bulbs renders as a
single virtual light card.
"""
enum GroupTag {
  LIGHT
  SENSOR
}

type GroupMember {
  id: ID!
  memberType: String!
  memberId: ID!
  device: Device
  group: Group
  room: Room
}

type Room {
  id: ID!
  name: String!
  icon: String
  members: [RoomMember!]!
  resolvedDevices: [Device!]!
  createdBy: User
}

type RoomMember {
  id: ID!
  memberType: String!
  memberId: ID!
  device: Device
  group: Group
}

type StateSeriesPoint {
  at: DateTime!
  value: Float!
}

type StateSeries {
  deviceId: ID!
  field: String!
  points: [StateSeriesPoint!]!
}

input StateHistoryFilter {
  deviceIds: [ID!]!
  fields: [String!]
  from: DateTime
  to: DateTime
  bucketSeconds: Int
}

type DeviceStateEvent {
  deviceId: ID!
  state: DeviceState!
}

type DeviceActionEvent {
  deviceId: ID!
  action: String!
  firedAt: DateTime!
}

type DeviceAvailabilityEvent {
  deviceId: ID!
  available: Boolean!
}

type AutomationNodeActivationEvent {
  automationId: ID!
  nodeId: ID!
  active: Boolean!
}

"""
Emitted whenever a scene's activation state flips. activatedAt is non-null
when the scene just became active, null when it was deactivated by a
device-state change.
"""
type SceneActiveEvent {
  sceneId: ID!
  activatedAt: DateTime
}

enum Theme {
  LIGHT
  DARK
}

type User {
  id: ID!
  username: String!
  name: String!
  """
  Avatar filename on the server, relative to the avatars endpoint. Null when
  no avatar has been uploaded; clients fall back to rendered initials. Resolve
  to a URL by prefixing with `/avatars/`.
  """
  avatarPath: String
  """
  UI theme preference stored per user. Present on full user loads (`me`,
  `users`). Null on attribution references (e.g. `scene.createdBy`), which
  only populate `id`, `username`, and `name`.
  """
  theme: Theme
  """
  Timestamp the user was created; used on the profile page as "member since".
  Present on full user loads, null on attribution references.
  """
  createdAt: DateTime
  """
  When true, the user must change their password before any other authenticated
  operation will succeed. Set automatically when an admin creates a user or
  resets their password; cleared when the user completes the forced-change
  flow. Present on full user loads (`me`, `users`, `AuthPayload.user`); null
  on attribution references.
  """
  mustChangePassword: Boolean
}

type AuthPayload {
  token: String!
  user: User!
}

type SetupStatus {
  hasInitialUser: Boolean!
  mqttConfigured: Boolean!
}

input LoginInput {
  username: String!
  password: String!
}

input CreateInitialUserInput {
  username: String!
  name: String!
  password: String!
}

input CreateUserInput {
  username: String!
  name: String!
  password: String!
}

input UpdateCurrentUserInput {
  name: String
  theme: Theme
}

input ChangePasswordInput {
  oldPassword: String!
  newPassword: String!
}

type MqttConfig {
  broker: String!
  username: String!
  password: String!
  useWss: Boolean!
}

type ConnectionTestResult {
  success: Boolean!
  message: String!
}

type Setting {
  key: String!
  value: String!
}

type LogEntry {
  timestamp: DateTime!
  level: String!
  message: String!
  attrs: String!
}

type ActivitySource {
  kind: String!
  id: ID
  name: String
  type: String
  roomId: ID
  roomName: String
}

type ActivityEvent {
  id: ID!
  type: String!
  timestamp: DateTime!
  message: String!
  payload: String!
  source: ActivitySource!
}

input ActivityFilter {
  types: [String!]
  deviceId: ID
  roomId: ID
  since: DateTime
  advanced: Boolean
  limit: Int
  before: ID
}

enum AlarmSeverity {
  HIGH
  MEDIUM
  LOW
}

enum AlarmKind {
  AUTO
  ONE_SHOT
}

"""
An alarm is an actionable severity-tagged signal. Rows are persisted 1:1 per
raise; this type is the grouped projection — multiple raises sharing the same
id collapse into one Alarm whose message/severity/kind come from the latest
raise and whose count reflects the group size.
"""
type Alarm {
  id: ID!
  latestRowId: ID!
  severity: AlarmSeverity!
  kind: AlarmKind!
  message: String!
  source: String!
  count: Int!
  firstRaisedAt: DateTime!
  lastRaisedAt: DateTime!
}

enum AlarmEventKind {
  RAISED
  CLEARED
}

type AlarmEvent {
  kind: AlarmEventKind!
  alarm: Alarm
  clearedAlarmId: ID
}

input AlarmFilter {
  severities: [AlarmSeverity!]
  kinds: [AlarmKind!]
  sources: [String!]
  since: DateTime
}

input RaiseAlarmInput {
  alarmId: ID!
  severity: AlarmSeverity!
  kind: AlarmKind!
  message: String!
  source: String
}

input MqttConfigInput {
  broker: String!
  username: String!
  password: String!
  useWss: Boolean!
}

input DeviceStateInput {
  on: Boolean
  brightness: Int
  colorTemp: Int
  color: ColorInput
  transition: Float
}

input ColorInput {
  r: Int!
  g: Int!
  b: Int!
  x: Float!
  y: Float!
}

input UpdateDeviceInput {
  name: String
  icon: String
}

input CreateSceneInput {
  name: String!
  actions: [SceneActionInput!]!
  devicePayloads: [SceneDevicePayloadInput!]
  roomIds: [ID!]
}

input SceneActionInput {
  targetType: String!
  targetId: ID!
}

"""
SceneDevicePayloadInput is one entry in a scene's per-device payload list.
The payload field is a JSON string carrying a tagged-union body. Three shapes
are supported:

  static:        {"kind":"static","on":true,"brightness":200,"colorTemp":370}
  effect:        {"kind":"effect","effect_id":"<id>"}
  native_effect: {"kind":"native_effect","native_name":"<name>"}

The static shape's optional desired-state fields (on, brightness, colorTemp,
color, transition) are filtered against the device's writable capabilities at
apply time. The effect shape starts the named stored timeline/native effect
run on this device when the scene is applied. The native_effect shape starts
an auto-discovered native effect (one whose name appears in
nativeEffectOptions) on this device. Deactivating the scene stops any runs
started for either effect shape.
"""
input SceneDevicePayloadInput {
  deviceId: ID!
  payload: String!
}

input UpdateSceneInput {
  name: String
  icon: String
  actions: [SceneActionInput!]
  devicePayloads: [SceneDevicePayloadInput!]
  roomIds: [ID!]
}

input CreateAutomationInput {
  name: String!
  enabled: Boolean!
  nodes: [AutomationNodeInput!]!
  edges: [AutomationEdgeInput!]!
}

input AutomationNodeInput {
  id: ID!
  type: String!
  config: String!
  positionX: Float! = 0
  positionY: Float! = 0
}

input AutomationEdgeInput {
  fromNodeId: ID!
  toNodeId: ID!
}

input CreateGroupInput {
  name: String!
  tags: [GroupTag!]
}

input UpdateGroupInput {
  name: String
  icon: String
  tags: [GroupTag!]
}

input AddGroupMemberInput {
  groupId: ID!
  memberType: String!
  memberId: ID!
}

input CreateRoomInput {
  name: String!
}

input UpdateRoomInput {
  name: String
  icon: String
}

input AddRoomMemberInput {
  roomId: ID!
  memberType: String!
  memberId: ID!
}

input RoomMemberInput {
  memberType: String!
  memberId: ID!
}

input UpdateAutomationInput {
  name: String
  icon: String
  enabled: Boolean
  nodes: [AutomationNodeInput!]
  edges: [AutomationEdgeInput!]
}

type Query {
  devices: [Device!]! @auth
  device(id: ID!): Device @auth
  scenes: [Scene!]! @auth
  scene(id: ID!): Scene @auth
  automations: [AutomationGraph!]! @auth
  automation(id: ID!): AutomationGraph @auth
  groups: [Group!]! @auth
  group(id: ID!): Group @auth
  rooms: [Room!]! @auth
  room(id: ID!): Room @auth
  stateHistory(filter: StateHistoryFilter!): [StateSeries!]! @auth
  stateHistoryFields: [String!]! @auth
  mqttConfig: MqttConfig @auth
  settings: [Setting!]! @auth
  logs(search: String, limit: Int): [LogEntry!]! @auth
  activity(filter: ActivityFilter): [ActivityEvent!]! @auth
  alarms(filter: AlarmFilter): [Alarm!]! @auth
  setupStatus: SetupStatus!
  me: User
  users: [User!]! @auth
  effects: [Effect!]! @auth
  effect(id: ID!): Effect @auth
  activeEffects: [ActiveEffect!]! @auth
  nativeEffectOptions: [NativeEffectOption!]! @auth
}

type Mutation {
  updateDevice(id: ID!, input: UpdateDeviceInput!): Device! @auth
  setDeviceState(deviceId: ID!, state: DeviceStateInput!): Device! @auth
  """
  Simulate a device-fired action by publishing a synthetic
  EventDeviceActionFired on the in-process event bus. Automations listening
  for the action run as if the physical device emitted it; no command is
  sent to the device itself. Useful for testing automations from the UI.
  """
  simulateDeviceAction(deviceId: ID!, action: String!): Boolean! @auth
  applyScene(sceneId: ID!): Scene! @auth
  createScene(input: CreateSceneInput!): Scene! @auth
  updateScene(id: ID!, input: UpdateSceneInput!): Scene! @auth
  deleteScene(id: ID!): Boolean! @auth
  createAutomation(input: CreateAutomationInput!): AutomationGraph! @auth
  updateAutomation(id: ID!, input: UpdateAutomationInput!): AutomationGraph! @auth
  deleteAutomation(id: ID!): Boolean! @auth
  toggleAutomation(id: ID!, enabled: Boolean!): AutomationGraph! @auth
  """
  Fires a manual trigger node immediately. The automation must be enabled and
  the node must be a trigger with mode=manual. Bypasses the automation's
  cooldown. Intended for debugging automations from the editor.
  """
  fireAutomationTrigger(automationId: ID!, nodeId: ID!): Boolean! @auth
  createGroup(input: CreateGroupInput!): Group! @auth
  updateGroup(id: ID!, input: UpdateGroupInput!): Group! @auth
  deleteGroup(id: ID!): Boolean! @auth
  addGroupMember(input: AddGroupMemberInput!): GroupMember! @auth
  removeGroupMember(id: ID!): Boolean! @auth
  createRoom(input: CreateRoomInput!): Room! @auth
  updateRoom(id: ID!, input: UpdateRoomInput!): Room! @auth
  deleteRoom(id: ID!): Boolean! @auth
  addRoomMember(input: AddRoomMemberInput!): RoomMember! @auth
  removeRoomMember(id: ID!): Boolean! @auth
  updateMqttConfig(input: MqttConfigInput!): MqttConfig! @auth
  testMqttConnection(input: MqttConfigInput!): ConnectionTestResult! @auth
  updateSetting(key: String!, value: String!): Setting! @auth
  login(input: LoginInput!): AuthPayload!
  createInitialUser(input: CreateInitialUserInput!): AuthPayload!
  createUser(input: CreateUserInput!): User! @auth
  updateCurrentUser(input: UpdateCurrentUserInput!): User! @auth
  changePassword(input: ChangePasswordInput!): Boolean! @auth
  """
  Completes the forced first-login password change. Only callable while the
  caller's `mustChangePassword` flag is set; the AuthDirective allowlists this
  field for users in the forced-change state. Sets the new password hash and
  clears the flag in one statement. Returns false if the caller was not in the
  forced-change state.
  """
  completeFirstPasswordChange(newPassword: String!): Boolean! @auth
  resetUserPassword(id: ID!, newPassword: String!): Boolean! @auth
  deleteUser(id: ID!): Boolean! @auth
  raiseAlarm(input: RaiseAlarmInput!): Alarm! @auth
  deleteAlarm(alarmId: ID!): Boolean! @auth

  batchDeleteScenes(ids: [ID!]!): Int! @auth
  batchDeleteAutomations(ids: [ID!]!): Int! @auth
  batchDeleteGroups(ids: [ID!]!): Int! @auth
  batchDeleteRooms(ids: [ID!]!): Int! @auth
  batchDeleteAlarms(alarmIds: [ID!]!): Int! @auth
  """
  Deletes the specified users. The currently authenticated user is silently
  skipped if present in the list. Returns the number of users actually deleted.
  """
  batchDeleteUsers(ids: [ID!]!): Int! @auth

  batchAddRoomMembers(roomId: ID!, members: [RoomMemberInput!]!): Room! @auth
  batchAddGroupDevices(groupId: ID!, deviceIds: [ID!]!): Group! @auth

  createEffect(input: CreateEffectInput!): Effect! @auth
  updateEffect(input: UpdateEffectInput!): Effect! @auth
  deleteEffect(id: ID!): Boolean! @auth
  """
  Starts effectId on the given target. Preempts any effect already
  running on the target. Returns the resulting active-run row.
  """
  runEffect(effectId: ID!, targetType: String!, targetId: ID!): ActiveEffect! @auth
  """
  Starts a native effect by name on the given target without requiring a
  stored Effect row. Preempts any effect already running on the target.
  Native ad-hoc runs are fire-and-forget: no active_effects row is
  persisted, so Query.activeEffects will not list them. The returned
  ActiveEffect synthesises a transient view of the run.
  """
  runNativeEffect(nativeName: String!, targetType: String!, targetId: ID!): ActiveEffect! @auth
  """
  Stops any effect currently running on the target. Returns true when a
  run was active, false otherwise.
  """
  stopEffect(targetType: String!, targetId: ID!): Boolean! @auth
}

type Subscription {
  deviceStateChanged(deviceId: ID): DeviceStateEvent! @auth
  deviceActionFired(deviceId: ID): DeviceActionEvent! @auth
  deviceAvailabilityChanged: DeviceAvailabilityEvent! @auth
  deviceAdded: Device! @auth
  deviceRemoved: ID! @auth
  automationNodeActivated(automationId: ID): AutomationNodeActivationEvent! @auth
  sceneActiveChanged: SceneActiveEvent! @auth
  logStream: LogEntry! @auth
  activityStream(advanced: Boolean): ActivityEvent! @auth
  alarmEvent: AlarmEvent! @auth
  """
  Step-boundary events from the effect runner. When runId is provided,
  only events for that run are delivered; otherwise every effect run's
  step boundaries are broadcast.
  """
  effectStepActivated(runId: ID): EffectStepEvent! @auth
}
