scalar DateTime

union DeviceState = LightState | SensorState | SwitchState

type Device {
  id: ID!
  name: String!
  source: String!
  type: String!
  available: Boolean!
  lastSeen: DateTime
  state: DeviceState
}

type LightState {
  on: Boolean
  brightness: Int
  colorTemp: Int
  color: Color
  transition: Float
}

type SensorState {
  temperature: Float
  humidity: Float
  battery: Int
  pressure: Float
  illuminance: Float
}

type SwitchState {
  action: String
}

type Color {
  r: Int!
  g: Int!
  b: Int!
  x: Float!
  y: Float!
}

type Scene {
  id: ID!
  name: String!
  actions: [SceneAction!]!
}

union SceneTarget = Device | Group

type SceneAction {
  id: ID!
  targetType: String!
  targetId: ID!
  target: SceneTarget!
  payload: String!
}

type AutomationGraph {
  id: ID!
  name: String!
  enabled: Boolean!
  cooldownSeconds: Int!
  nodes: [AutomationNode!]!
  edges: [AutomationEdge!]!
}

type AutomationNode {
  id: ID!
  type: String!
  config: String!
}

type AutomationEdge {
  id: ID!
  fromNodeId: ID!
  toNodeId: ID!
}

type Group {
  id: ID!
  name: String!
  members: [GroupMember!]!
  resolvedDevices: [Device!]!
}

type GroupMember {
  id: ID!
  memberType: String!
  memberId: ID!
  device: Device
  group: Group
}

type SensorReading {
  id: ID!
  deviceId: ID!
  temperature: Float
  humidity: Float
  battery: Int
  pressure: Float
  illuminance: Float
  recordedAt: DateTime!
}

type DeviceStateEvent {
  deviceId: ID!
  state: DeviceState!
}

type DeviceAvailabilityEvent {
  deviceId: ID!
  available: Boolean!
}

type AutomationNodeActivationEvent {
  automationId: ID!
  nodeId: ID!
  active: Boolean!
}

input LightStateInput {
  on: Boolean
  brightness: Int
  colorTemp: Int
  color: ColorInput
  transition: Float
}

input ColorInput {
  r: Int!
  g: Int!
  b: Int!
  x: Float!
  y: Float!
}

input CreateSceneInput {
  name: String!
  actions: [SceneActionInput!]!
}

input SceneActionInput {
  targetType: String!
  targetId: ID!
  payload: String!
}

input UpdateSceneInput {
  name: String
  actions: [SceneActionInput!]
}

input CreateAutomationInput {
  name: String!
  enabled: Boolean!
  cooldownSeconds: Int!
  nodes: [AutomationNodeInput!]!
  edges: [AutomationEdgeInput!]!
}

input AutomationNodeInput {
  id: ID!
  type: String!
  config: String!
}

input AutomationEdgeInput {
  fromNodeId: ID!
  toNodeId: ID!
}

input CreateGroupInput {
  name: String!
}

input UpdateGroupInput {
  name: String
}

input AddGroupMemberInput {
  groupId: ID!
  memberType: String!
  memberId: ID!
}

input UpdateAutomationInput {
  name: String
  enabled: Boolean
  cooldownSeconds: Int
  nodes: [AutomationNodeInput!]
  edges: [AutomationEdgeInput!]
}

type Query {
  devices: [Device!]!
  device(id: ID!): Device
  scenes: [Scene!]!
  scene(id: ID!): Scene
  automations: [AutomationGraph!]!
  automation(id: ID!): AutomationGraph
  groups: [Group!]!
  group(id: ID!): Group
  sensorHistory(deviceId: ID!, from: DateTime, to: DateTime, limit: Int): [SensorReading!]!
}

type Mutation {
  setDeviceState(deviceId: ID!, state: LightStateInput!): Device!
  applyScene(sceneId: ID!): Scene!
  createScene(input: CreateSceneInput!): Scene!
  updateScene(id: ID!, input: UpdateSceneInput!): Scene!
  deleteScene(id: ID!): Boolean!
  createAutomation(input: CreateAutomationInput!): AutomationGraph!
  updateAutomation(id: ID!, input: UpdateAutomationInput!): AutomationGraph!
  deleteAutomation(id: ID!): Boolean!
  toggleAutomation(id: ID!, enabled: Boolean!): AutomationGraph!
  createGroup(input: CreateGroupInput!): Group!
  updateGroup(id: ID!, input: UpdateGroupInput!): Group!
  deleteGroup(id: ID!): Boolean!
  addGroupMember(input: AddGroupMemberInput!): GroupMember!
  removeGroupMember(id: ID!): Boolean!
}

type Subscription {
  deviceStateChanged(deviceId: ID): DeviceStateEvent!
  deviceAvailabilityChanged: DeviceAvailabilityEvent!
  deviceAdded: Device!
  deviceRemoved: ID!
  automationNodeActivated(automationId: ID): AutomationNodeActivationEvent!
}
