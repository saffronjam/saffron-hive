scalar DateTime

union DeviceState = LightState | SensorState | SwitchState

type Capability {
  name: String!
  type: String!
  values: [String!]
  valueMin: Float
  valueMax: Float
  unit: String
  access: Int!
}

type Device {
  id: ID!
  name: String!
  source: String!
  type: String!
  capabilities: [Capability!]!
  available: Boolean!
  lastSeen: DateTime
  state: DeviceState
}

type LightState {
  on: Boolean
  brightness: Int
  colorTemp: Int
  color: Color
  transition: Float
}

type SensorState {
  temperature: Float
  humidity: Float
  battery: Int
  pressure: Float
  illuminance: Float
}

type SwitchState {
  action: String
}

type Color {
  r: Int!
  g: Int!
  b: Int!
  x: Float!
  y: Float!
}

type Scene {
  id: ID!
  name: String!
  icon: String
  actions: [SceneAction!]!
}

union SceneTarget = Device | Group | Room

type SceneAction {
  id: ID!
  targetType: String!
  targetId: ID!
  target: SceneTarget!
  payload: String!
}

type AutomationGraph {
  id: ID!
  name: String!
  icon: String
  enabled: Boolean!
  cooldownSeconds: Int!
  nodes: [AutomationNode!]!
  edges: [AutomationEdge!]!
}

type AutomationNode {
  id: ID!
  type: String!
  config: String!
}

type AutomationEdge {
  id: ID!
  fromNodeId: ID!
  toNodeId: ID!
}

type Group {
  id: ID!
  name: String!
  icon: String
  members: [GroupMember!]!
  resolvedDevices: [Device!]!
}

type GroupMember {
  id: ID!
  memberType: String!
  memberId: ID!
  device: Device
  group: Group
  room: Room
}

type Room {
  id: ID!
  name: String!
  icon: String
  devices: [Device!]!
}

type SensorReading {
  id: ID!
  deviceId: ID!
  temperature: Float
  humidity: Float
  battery: Int
  pressure: Float
  illuminance: Float
  recordedAt: DateTime!
}

type DeviceStateEvent {
  deviceId: ID!
  state: DeviceState!
}

type DeviceAvailabilityEvent {
  deviceId: ID!
  available: Boolean!
}

type AutomationNodeActivationEvent {
  automationId: ID!
  nodeId: ID!
  active: Boolean!
}

type MqttConfig {
  broker: String!
  username: String!
  password: String!
  useWss: Boolean!
}

type ConnectionTestResult {
  success: Boolean!
  message: String!
}

type Setting {
  key: String!
  value: String!
}

type LogEntry {
  timestamp: DateTime!
  level: String!
  message: String!
  attrs: String!
}

input MqttConfigInput {
  broker: String!
  username: String!
  password: String!
  useWss: Boolean!
}

input LightStateInput {
  on: Boolean
  brightness: Int
  colorTemp: Int
  color: ColorInput
  transition: Float
}

input ColorInput {
  r: Int!
  g: Int!
  b: Int!
  x: Float!
  y: Float!
}

input UpdateDeviceInput {
  name: String
}

input CreateSceneInput {
  name: String!
  actions: [SceneActionInput!]!
}

input SceneActionInput {
  targetType: String!
  targetId: ID!
  payload: String!
}

input UpdateSceneInput {
  name: String
  icon: String
  actions: [SceneActionInput!]
}

input CreateAutomationInput {
  name: String!
  enabled: Boolean!
  cooldownSeconds: Int!
  nodes: [AutomationNodeInput!]!
  edges: [AutomationEdgeInput!]!
}

input AutomationNodeInput {
  id: ID!
  type: String!
  config: String!
}

input AutomationEdgeInput {
  fromNodeId: ID!
  toNodeId: ID!
}

input CreateGroupInput {
  name: String!
}

input UpdateGroupInput {
  name: String
  icon: String
}

input AddGroupMemberInput {
  groupId: ID!
  memberType: String!
  memberId: ID!
}

input CreateRoomInput {
  name: String!
}

input UpdateRoomInput {
  name: String
  icon: String
}

input AddRoomDeviceInput {
  roomId: ID!
  deviceId: ID!
}

input UpdateAutomationInput {
  name: String
  icon: String
  enabled: Boolean
  cooldownSeconds: Int
  nodes: [AutomationNodeInput!]
  edges: [AutomationEdgeInput!]
}

type Query {
  devices: [Device!]!
  device(id: ID!): Device
  scenes: [Scene!]!
  scene(id: ID!): Scene
  automations: [AutomationGraph!]!
  automation(id: ID!): AutomationGraph
  groups: [Group!]!
  group(id: ID!): Group
  rooms: [Room!]!
  room(id: ID!): Room
  sensorHistory(deviceId: ID!, from: DateTime, to: DateTime, limit: Int): [SensorReading!]!
  mqttConfig: MqttConfig
  settings: [Setting!]!
  logs(search: String, limit: Int): [LogEntry!]!
}

type Mutation {
  updateDevice(id: ID!, input: UpdateDeviceInput!): Device!
  setDeviceState(deviceId: ID!, state: LightStateInput!): Device!
  applyScene(sceneId: ID!): Scene!
  createScene(input: CreateSceneInput!): Scene!
  updateScene(id: ID!, input: UpdateSceneInput!): Scene!
  deleteScene(id: ID!): Boolean!
  createAutomation(input: CreateAutomationInput!): AutomationGraph!
  updateAutomation(id: ID!, input: UpdateAutomationInput!): AutomationGraph!
  deleteAutomation(id: ID!): Boolean!
  toggleAutomation(id: ID!, enabled: Boolean!): AutomationGraph!
  createGroup(input: CreateGroupInput!): Group!
  updateGroup(id: ID!, input: UpdateGroupInput!): Group!
  deleteGroup(id: ID!): Boolean!
  addGroupMember(input: AddGroupMemberInput!): GroupMember!
  removeGroupMember(id: ID!): Boolean!
  createRoom(input: CreateRoomInput!): Room!
  updateRoom(id: ID!, input: UpdateRoomInput!): Room!
  deleteRoom(id: ID!): Boolean!
  addRoomDevice(input: AddRoomDeviceInput!): Room!
  removeRoomDevice(roomId: ID!, deviceId: ID!): Room!
  updateMqttConfig(input: MqttConfigInput!): MqttConfig!
  testMqttConnection(input: MqttConfigInput!): ConnectionTestResult!
  updateSetting(key: String!, value: String!): Setting!
}

type Subscription {
  deviceStateChanged(deviceId: ID): DeviceStateEvent!
  deviceAvailabilityChanged: DeviceAvailabilityEvent!
  deviceAdded: Device!
  deviceRemoved: ID!
  automationNodeActivated(automationId: ID): AutomationNodeActivationEvent!
  logStream: LogEntry!
}
